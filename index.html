<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seventh.Lab</title>
  <link rel="icon" type="image/png" href="assets/images/logo1.png" />
  <meta name="description" content="Seventh.Lab - Creative Digital Solutions" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --red: #e00000;
      --red-dark: #9b0000;
      --bg-dark: #141414;
      --bg-mid: #1c1c1c;
      --bg-panel: #222222;
      --text-white: #ffffff;
      --text-muted: #aaaaaa;
      --nav-height: 60px;
    }

    html,
    body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-white);
      overflow: hidden;
    }

    /* ── HERO BACKGROUND ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Geometric dark background built purely with CSS */
    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, #0e0e0e 0%, #1a1a1a 40%, #242424 70%, #1a1a1a 100%);
      z-index: 0;
    }

    /* diagonal grid lines mimicking the building geometry */
    .hero-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(135deg,
          transparent 0px,
          transparent 58px,
          rgba(255, 255, 255, 0.025) 58px,
          rgba(255, 255, 255, 0.025) 60px),
        repeating-linear-gradient(45deg,
          transparent 0px,
          transparent 78px,
          rgba(255, 255, 255, 0.018) 78px,
          rgba(255, 255, 255, 0.018) 80px);
      z-index: 1;
    }

    /* large dark geometric panels */
    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(160deg, rgba(0, 0, 0, 0.55) 0%, transparent 50%),
        linear-gradient(340deg, rgba(0, 0, 0, 0.65) 0%, transparent 55%);
      z-index: 2;
    }

    /* extra angled panel shapes */
    .geo-shape {
      position: absolute;
      z-index: 3;
      pointer-events: none;
    }

    .geo-shape-1 {
      top: -10%;
      right: 5%;
      width: 38%;
      height: 90%;
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
      clip-path: polygon(20% 0%, 100% 0%, 80% 100%, 0% 100%);
    }

    .geo-shape-2 {
      top: 0;
      right: 20%;
      width: 28%;
      height: 70%;
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.04) 0%, transparent 100%);
      clip-path: polygon(30% 0%, 100% 0%, 70% 100%, 0% 100%);
    }

    .geo-shape-3 {
      bottom: -5%;
      left: 0%;
      width: 45%;
      height: 60%;
      background: linear-gradient(340deg, rgba(255, 255, 255, 0.025) 0%, transparent 100%);
      clip-path: polygon(0% 0%, 90% 0%, 100% 100%, 10% 100%);
    }

    .geo-shape-4 {
      top: 5%;
      left: 15%;
      width: 22%;
      height: 55%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, transparent 100%);
      clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
    }

    /* ── NAVBAR ── */
    nav {
      position: relative;
      z-index: 100;
      width: 100%;
      height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .nav-logo-img {
      height: 36px;
      width: auto;
      object-fit: contain;
      transition: opacity 0.2s ease;
    }

    .nav-brand:hover .nav-logo-img {
      opacity: 0.85;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 48px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.82);
      letter-spacing: 0.3px;
      transition: color 0.2s ease;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -3px;
      width: 0;
      height: 2px;
      background: var(--red);
      transition: width 0.25s ease;
    }

    .nav-links a:hover {
      color: #fff;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    /* Hamburger icon (three lines, red) */
    .nav-hamburger {
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }

    .nav-hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--red);
      border-radius: 2px;
      transition: transform 0.2s ease;
    }

    .nav-hamburger:hover span:nth-child(2) {
      transform: scaleX(0.7);
      transform-origin: right;
    }

    /* ── HERO CONTENT ── */
    .hero-content {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
      gap: 28px;
      animation: fadeInUp 0.9s ease both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(32px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero-title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    /* Flutter-like logo shape built in pure CSS */
    .flutter-logo {
      width: 80px;
      height: 80px;
      position: relative;
      flex-shrink: 0;
    }

    .flutter-logo .diamond-top {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 42px;
      height: 42px;
      background: var(--red);
      clip-path: polygon(0% 0%, 100% 0%, 100% 55%, 0% 55%);
    }

    .flutter-logo .diamond-bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 42px;
      height: 42px;
      background: var(--red);
      clip-path: polygon(0% 45%, 100% 45%, 100% 100%, 0% 100%);
      opacity: 0.75;
    }

    /* simpler & cleaner chevron-like logo */
    .logo-mark {
      width: 72px;
      height: 72px;
      position: relative;
    }

    .logo-mark svg {
      width: 100%;
      height: 100%;
    }

    .hero-title {
      font-size: clamp(42px, 6vw, 72px);
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
      line-height: 1;
      text-shadow: 0 4px 32px rgba(0, 0, 0, 0.5);
    }

    .hero-url-badge {
      display: inline-block;
      position: relative;
      padding: 12px 40px;
      background: linear-gradient(90deg, var(--red-dark) 0%, var(--red) 60%, var(--red-dark) 100%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      transition: box-shadow 0.3s ease, transform 0.2s ease;
      box-shadow: 0 0 24px rgba(200, 0, 0, 0.35);
    }

    .hero-url-badge::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.07) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .hero-url-badge:hover::before {
      transform: translateX(100%);
    }

    .hero-url-badge:hover {
      box-shadow: 0 0 40px rgba(220, 0, 0, 0.55);
      transform: translateY(-2px);
    }

    /* ── PAGE INDICATOR ── */
    .page-indicator {
      position: absolute;
      bottom: 24px;
      right: 32px;
      z-index: 10;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 0;
    }

    .page-indicator .separator {
      margin: 0 6px;
      color: rgba(255, 255, 255, 0.3);
    }

    .page-indicator .page-num {
      color: rgba(255, 255, 255, 0.85);
      font-weight: 700;
    }

    /* ── MENU OVERLAY ── */
    .menu-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.98);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.5s cubic-bezier(0.77, 0, 0.175, 1);
    }

    .menu-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .menu-close {
      position: absolute;
      top: 24px;
      right: 32px;
      font-size: 32px;
      color: var(--red);
      cursor: pointer;
      font-weight: 300;
    }

    .menu-list {
      list-style: none;
      text-align: center;
    }

    .menu-list li {
      margin: 20px 0;
      overflow: hidden;
    }

    .menu-list a {
      text-decoration: none;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 800;
      color: #fff;
      display: block;
      transition: transform 0.3s ease, color 0.3s ease;
      transform: translateY(100%);
    }

    .menu-overlay.active .menu-list a {
      transform: translateY(0);
    }

    .menu-list a:hover {
      color: var(--red);
      transform: skewX(-5deg) scale(1.05);
    }

    .menu-sub-links {
      margin-top: 40px;
      display: flex;
      gap: 30px;
      opacity: 0;
      transition: opacity 0.5s ease 0.4s;
    }

    .menu-overlay.active .menu-sub-links {
      opacity: 1;
    }

    .menu-sub-links a {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s ease;
    }

    .menu-sub-links a:hover {
      color: #fff;
    }

    @media (max-width: 768px) {
      nav {
        padding: 0 16px;
      }

      .nav-links {
        display: none;
      }

      .hero-title {
        font-size: clamp(32px, 8vw, 48px);
        text-align: center;
      }

      .hero-title-row {
        flex-direction: column;
        gap: 10px;
      }

      .hero-title-row img {
        height: 60px !important;
      }

      .hero-url-badge {
        font-size: 11px;
        padding: 10px 24px;
        bottom: 32px;
      }

      .page-indicator {
        bottom: 16px;
        right: 16px;
        font-size: 11px;
      }

      .menu-list a {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <!-- Background layers -->
    <div class="hero-bg"></div>
    <div class="geo-shape geo-shape-1"></div>
    <div class="geo-shape geo-shape-2"></div>
    <div class="geo-shape geo-shape-3"></div>
    <div class="geo-shape geo-shape-4"></div>

    <!-- Navbar -->
    <nav>
      <a href="/" class="nav-brand" id="nav-brand">
        <img src="assets/images/logo.png" alt="Seventh.Lab" class="nav-logo-img">
      </a>

      <ul class="nav-links" id="nav-links">
        <li><a href="/" class="active" id="nav-home">Home</a></li>
        <li><a href="portfolio" id="nav-portfolio">Portfolio</a></li>
        <li><a href="service" id="nav-service">Service</a></li>
        <li><a href="about" id="nav-about">About Me</a></li>
        <li><a href="contact" id="nav-contact">Contact</a></li>
      </ul>

      <div class="nav-hamburger" id="nav-hamburger" aria-label="Menu" role="button" tabindex="0">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </nav>

    <!-- Hero content -->
    <div class="hero-content">
      <div class="hero-title-row">
        <!-- Large logo image -->
        <img src="assets/images/logo1.png" alt="Seventh.Lab Logo"
          style="height: 80px; width: auto; object-fit: contain;">
        <h1 class="hero-title">Seventh.Lab</h1>
      </div>

      <div class="hero-url-badge" id="hero-url-badge" role="button" tabindex="0" aria-label="Visit WWW.SEVENTH.SITE">
        WWW.SEVENTH.SITE
      </div>
    </div>

    <!-- Menu Overlay -->
    <div class="menu-overlay" id="menu-overlay">
      <div class="menu-close" id="menu-close">&times;</div>
      <ul class="menu-list">
        <li style="transition-delay: 0.1s;"><a href="/">Home</a></li>
        <li style="transition-delay: 0.2s;"><a href="portfolio">Portfolio</a></li>
        <li style="transition-delay: 0.3s;"><a href="service">Services</a></li>
        <li style="transition-delay: 0.4s;"><a href="about">About Us</a></li>
        <li style="transition-delay: 0.5s;"><a href="contact">Contact</a></li>
      </ul>
      <div class="menu-sub-links">
        <a href="team">Our Team</a>
        <a href="office">Office</a>
        <a href="vision">Vision & Mission</a>
      </div>
    </div>

    <script>
      const hamburger = document.getElementById('nav-hamburger');
      const menuOverlay = document.getElementById('menu-overlay');
      const menuClose = document.getElementById('menu-close');

      hamburger.addEventListener('click', () => {
        menuOverlay.classList.add('active');
      });

      menuClose.addEventListener('click', () => {
        menuOverlay.classList.remove('active');
      });

      // Close on escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') menuOverlay.classList.remove('active');
      });
    </script>
  </section>

</body>

</html>
